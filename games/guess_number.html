<!DOCTYPE html>
<html>
<head>
<title>Guess The Number</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #1e1e1e;
    color: white;
    margin-top: 100px;
}

input {
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px 15px;
    font-size: 16px;
    margin-left: 5px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>🎮 Guess The Number</h1>
<p>Guess a number between <b>1 and 10</b></p>

<input id="guess" type="number" min="1" max="10">
<button onclick="checkGuess()">Guess</button>

<p id="result"></p>

<script>
let secretNumber = Math.floor(Math.random() * 10) + 1;

function checkGuess() {

    let guess = document.getElementById("guess").value;

    if (guess == "") {
        document.getElementById("result").innerText = "Enter a number!";
        return;
    }

    if (guess == secretNumber) {
        document.getElementById("result").innerText = "🎉 Correct! You guessed it!";
    } else if (guess > secretNumber) {
        document.getElementById("result").innerText = "Too high! Try again.";
    } else {
        document.getElementById("result").innerText = "Too low! Try again.";
    }

}
</script>

</body>
</html>
